# stock-agent strategy parameters (V1). All numeric params are backtest-sweep candidates,
# these are baseline defaults per DESIGN.md. Edit freely; log changes for reproducibility.

# ---- Portfolio (Q5) ----
portfolio:
  k: 3                  # number of sector ETFs held simultaneously (equal weight)
  equal_weight: true    # each held sector gets 1/k
  rebalance_threshold: 0.10  # V2.9: skip reweight if deviation < 10% (reduces micro-trades)

# ---- Rotation layer (weekly, Friday close) (Q4, Q6) ----
rotation:
  rebalance_weekday: 4  # 0=Mon .. 4=Fri
  signal:
    name: value_flow    # V3.0 default — multi-window validated (gate 2/4, drawdown<bm 4/4, params stable)
  trend_gate_ma: 60     # candidate must have close > MA(60) to be eligible (momentum)
  momentum:
    windows: [60, 120, 250]     # lookback days (slow momentum — sweep winner)
    weights: [0.2, 0.3, 0.5]    # weights, summing to 1
  reversion:             # V2.1 mean-reversion signal: buy oversold pullbacks in uptrend
    rsi_period: 14
    oversold_threshold: 30      # train-best (walk-forward OOS: +5.5% / -9.4% mdd)
    long_ma: 250          # eligible only if close > MA(long_ma)
  bb_macd:               # V2.2 Bollinger + MACD signal (dip recovery / trend ride)
    bb_period: 20
    bb_std: 2.0
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    pctb_low: 0.1         # dip mode: %B threshold (near lower band)
    pctb_high: 1.0        # trend mode: %B threshold (near/above upper band)
    long_ma: 250          # eligible only if close > MA(long_ma)
    mode: both            # dip | trend | both
  share_flow:            # V2.6 multi-timeframe consensus: robust institutional flow
    roc_short_days: 20    # short ROC window (~1 month)
    roc_mid_days: 60      # mid ROC window (~3 months)
    roc_long_days: 120    # long ROC window (~6 months)
    accum_threshold: 0.02 # min ROC for an "accumulating" vote (sweep 0.01/0.02/0.05)
    dist_threshold: 0.02  # min negative ROC for a "distributing" vote
    price_backstop: 0.20  # tail-risk price stop (check_exits)
  value_flow:            # V3.0 value + smart money + dual-layer exit
    percentile_window: 500  # ~2yr lookback for "historical low"
    entry_percentile: 0.20  # buy when below 20th percentile (sweep winner)
    stabilize_lookback: 50  # price stabilization lookback
    stabilize_recent: 20    # no new low in last 20 days = stopped falling
    entry_stop: 0.15        # Layer 1: max loss from entry (always active, price is truth)
    accum_trail_mult: 2.0   # Layer 2: trailing from peak when ACCUMULATING (walk-forward winner, 3/4 windows)
    stable_trail_mult: 2.0  # when STABLE
    dist_trail_mult: 1.0    # when DISTRIBUTING (tight)
    min_hold_days: 60       # minimum holding period

# ---- Regime / market timing layer (daily) (Q7) ----
regime:
  benchmark_symbol: "510300"   # 沪深300 ETF (also used as backtest benchmark)
  ma_period: 200               # regime MA period (value_flow walk-forward winner; reversion preferred 120)
  band_pct: 0.02               # V2.7: deadband around MA (±2%); 0 = legacy
  confirm_days: 3              # V2.7: consecutive days beyond band to confirm flip; 1 = legacy
  risk_off_symbol: "511990"    # 货币ETF (华宝添益) — parking spot when risk-off

# ---- Per-position stop loss (daily) (Q8, V2.5 ATR-adaptive) ----
stop:
  trailing_pct: 0.08   # fixed % stop (used when method=fixed)
  method: atr           # "fixed" | "atr" — vol-adaptive or fixed percentage
  atr_period: 14        # volatility lookback for ATR proxy (close-based)
  atr_mult: 3.0         # stop distance = mult × avg daily vol (sweep 2/3/4/5)

# ---- Engine priority hard rule (Q13) ----
priority: ["stop", "rotation", "regime"]  # stop > rotation > regime on conflicts

# ---- Backtest (Q11) ----
backtest:
  single_side_cost: 0.001   # ~0.1% per side (commission + slippage, ETF has no stamp duty)
  fill: "next_open"         # signal on T close, fill at T+1 open
  enforce_t_plus_1: true    # cannot sell what was bought today
  adjust: "hfq"             # backtest uses 后复权 (history-stable, no lookahead leak)

# ---- Live data (Q10) ----
data:
  adjust: "raw"             # 不复权 (sina 原始价)；与 DB 实际 + fix_splits.py 一致。
                            # 增量更新按各 ETF 已有 source 族锁定基准 (fetcher.price_basis_family)，禁止 hfq 混入 raw
  history_years: 6          # how much history to backfill on init

# ---- Research module (V3.1 行业研究·性价比三因子) ----
# Read-only research report (does NOT feed the trading engine). See plans/breezy-jumping-pond.md.
# Composite = valuation(PE分位) + chip(筹码动向·含文章末期见底逻辑) + trend(价格趋势).
research:
  v1_symbols: ["512800", "512880", "512480", "512690", "512010", "510300"]
  pe_lookback_years: 3      # PE历史分位窗口（cninfo 行业PE历史~2023起，约3年）
  ma_period: 60             # 趋势因子均线
  weights:                  # 三因子复合权重（权益类）
    valuation: 0.40
    chip: 0.30
    trend: 0.30
  chip:
    # 方向分类复用 share_flow._classify_state（2-of-3 共识, 阈值取自 rotation.share_flow 段）
    # 位置 = reduction_from_peak = 1 - now/peak（基于各ETF自身历史份额峰值，自动检测）
    pos_deep: 0.50          # reduction >= 此值 = 深回撤（底部区域）
    pos_low: 0.20           # reduction <= 此值 = 近峰值（高位区域）
  chip_score:               # 6 相位分值 (position × 筹码状态)；含文章"末期见底"非单调逻辑
    deep_distributing: 50   # 下跌末段：深回撤+仍减（未确认见底）
    deep_stable: 85         # 🎯见底：深回撤+卖盘枯竭（斜率转平）
    deep_accumulating: 90   # 🎯低位加仓：深回撤+聪明钱重新进场（最看多）
    mid_distributing: 20    # ⚠️兑现中段：机构持续减仓·当下无性价比（文章主线·最看空）
    mid_stable: 50          # 观望
    mid_accumulating: 75    # 加仓
    low_distributing: 30    # 高位减仓
    low_stable: 40          # 见顶预警：份额加满·加仓停滞
    low_accumulating: 60    # 高位加仓：仍涨但风险积聚
